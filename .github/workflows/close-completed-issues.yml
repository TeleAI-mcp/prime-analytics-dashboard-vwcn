name: Close Completed Issues

on:
  issues:
    types: [labeled]

permissions:
  issues: write

jobs:
  close-completed:
    runs-on: ubuntu-latest
    steps:
      - name: Close issue if labeled 'completed'
        if: github.event.label.name == 'completed'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
            console.log(`Issue #${context.issue.number} automatically closed - labeled as completed`);